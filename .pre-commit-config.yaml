repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        require_serial: true
      - id: end-of-file-fixer
        require_serial: true
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.73.0
    hooks:
      - id: oxlint
        args: [ --quiet ]
        files: ^frontend/(apps|packages)/
        types_or: [ ts, javascript, tsx, jsx ]
        require_serial: true

  - repo: local
    hooks:
      - id: oxfmt
        name: Oxfmt
        entry: pnpm --dir frontend exec oxfmt --write --no-error-on-unmatched-pattern
        language: system
        files: ^frontend/(apps|packages)/
        types_or: [ ts, javascript, tsx, jsx ]
        require_serial: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^backend/
        types: [ python ]
        require_serial: true
      - id: ruff-format
        files: ^backend/
        types: [ python ]
        require_serial: true
